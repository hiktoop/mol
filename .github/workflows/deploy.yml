name: Deploy OPDS Catalog to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # 允许手动触发

permissions:
  contents: write      # 允许推送到 gh-pages

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate catalog.xml
        run: python generate_catalog.py

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./          # 把整个仓库（含 catalog.xml、covers/）推到 gh-pages
          publish_branch: gh-pages
          exclude_assets: ".github,generate_catalog.py,books,README.md"
          # 最终 gh-pages 分支只包含：catalog.xml + covers/
